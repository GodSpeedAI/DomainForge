name: Release PyPI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-sdist:
    name: Publish sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Decrypt secrets
        id: secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install maturin
        run: pip install maturin==1.10.1

      # Publish the sdist FIRST, before any wheel job, so the wheel matrix's
      # maturin publish sees the sdist already exists and skips it cleanly
      # (--skip-existing) instead of racing on the concurrent first upload.
      - name: Publish sdist
        working-directory: domainforge-python
        run: python -m maturin publish --features python --target x86_64-unknown-linux-gnu --skip-existing
        env:
          MATURIN_PYPI_TOKEN: ${{ steps.secrets.outputs.pypi-api-token || secrets.PYPI_API_TOKEN }}

  build-and-publish:
    name: Publish Wheels (${{ matrix.os }}, ${{ matrix.target }})
    needs: build-sdist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python 3.11
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, python-version: "3.11" }
          - { os: macos-15-intel, target: x86_64-apple-darwin, python-version: "3.11" }
          - { os: windows-2025-vs2026, target: x86_64-pc-windows-msvc, python-version: "3.11" }
          - { os: macos-15, target: aarch64-apple-darwin, python-version: "3.11" }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, python-version: "3.11", use_zig: true }
          # Python 3.12
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, python-version: "3.12" }
          - { os: macos-15-intel, target: x86_64-apple-darwin, python-version: "3.12" }
          - { os: windows-2025-vs2026, target: x86_64-pc-windows-msvc, python-version: "3.12" }
          - { os: macos-15, target: aarch64-apple-darwin, python-version: "3.12" }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, python-version: "3.12", use_zig: true }
          # Python 3.13
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, python-version: "3.13" }
          - { os: macos-15-intel, target: x86_64-apple-darwin, python-version: "3.13" }
          - { os: windows-2025-vs2026, target: x86_64-pc-windows-msvc, python-version: "3.13" }
          - { os: macos-15, target: aarch64-apple-darwin, python-version: "3.13" }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, python-version: "3.13", use_zig: true }
    steps:
      - uses: actions/checkout@v6

      - name: Decrypt secrets
        id: secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin==1.10.1

      - name: Install Zig (for ARM Linux cross-compile)
        if: matrix.use_zig == true
        shell: bash
        run: |
          ZIG_VERSION="0.11.0"
          ZIG_SHA256="2d00e789fec4f71790a6e7bf83ff91d564943c5ee843c5fd966efc474b423047"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          curl -sSLo "$RUNNER_TEMP/zig.tar.xz" "$ZIG_URL"
          echo "${ZIG_SHA256}  $RUNNER_TEMP/zig.tar.xz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/zig"
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP/zig" --strip-components=1
          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/zig/zig" version

      - name: Build and publish wheels (native)
        if: matrix.use_zig != true
        shell: bash
        working-directory: domainforge-python
        run: |
          python -m maturin publish \
            --features python \
            --target ${{ matrix.target }} \
            --skip-existing
        env:
          MATURIN_PYPI_TOKEN: ${{ steps.secrets.outputs.pypi-api-token || secrets.PYPI_API_TOKEN }}

      - name: Build and publish wheels (cross-compile with Zig)
        if: matrix.use_zig == true
        shell: bash
        working-directory: domainforge-python
        run: |
          python -m maturin publish \
            --features python \
            --target ${{ matrix.target }} \
            --skip-existing \
            --zig \
            -i python${{ matrix.python-version }}
        env:
          MATURIN_PYPI_TOKEN: ${{ steps.secrets.outputs.pypi-api-token || secrets.PYPI_API_TOKEN }}
