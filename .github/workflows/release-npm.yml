name: Release NPM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish napi bindings to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decrypt secrets
        id: secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm install

      - name: Build napi package
        run: npm run build

      - name: Check if already published
        run: |
          if npm view "@domainforge/sea@$(node -p "require('./package.json').version")" version >/dev/null 2>&1; then
            echo "Already published, skipping"
            echo "SKIP_PUBLISH=1" >> $GITHUB_ENV
          fi

      - name: Publish to npm
        if: env.SKIP_PUBLISH != '1'
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm-token }}

  publish-wasm:
    name: Publish WASM package to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decrypt secrets
        id: secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        run: |
          cd sea-core
          wasm-pack build --target web --release --scope domainforge -- --features wasm

      - name: Check if WASM already published
        run: |
          cd sea-core/pkg
          if npm view "@domainforge/sea-wasm@$(node -p "require('./package.json').version")" version >/dev/null 2>&1; then
            echo "Already published, skipping"
            echo "SKIP_PUBLISH=1" >> $GITHUB_ENV
          fi

      - name: Publish WASM to npm
        if: env.SKIP_PUBLISH != '1'
        run: |
          cd sea-core/pkg
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm-token }}
