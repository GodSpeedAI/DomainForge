name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CACHE_VERSION: v4 # Increment to bust all caches
  CLI_MAX_BYTES: "52428800" # 50MB
  WASM_MAX_BYTES: "2621440" # 2.5MB

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry/index
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-index

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Run rustfmt
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-rust:
    name: Test Rust (${{ matrix.os }})
    needs: lint
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Run unit tests
        run: just ci-test-rust

      - name: Build release CLI binary (verify)
        run: |
          cd domainforge-core
          cargo build --release --target ${{ matrix.target }} --features cli

      - name: Resolve CLI binary path
        if: matrix.os != 'windows-2025-vs2026'
        run: |
          CLI_BIN=$(python3 scripts/resolve_rust_binary.py --workspace "$(pwd)" --name domainforge --profile release --target-triple ${{ matrix.target }} --require-executable)
          echo "Resolved CLI binary: $CLI_BIN"
          echo "CLI_BIN=$CLI_BIN" >> "$GITHUB_ENV"

      - name: Resolve CLI binary path (windows)
        if: matrix.os == 'windows-2025-vs2026'
        shell: pwsh
        run: |
          $workspace = (Get-Location).Path
          $cliBin = python scripts/resolve_rust_binary.py --workspace "$workspace" --name domainforge --profile release --target-triple ${{ matrix.target }} --require-executable
          Write-Host "Resolved CLI binary: $cliBin"
          "CLI_BIN=$cliBin" >> $env:GITHUB_ENV

      - name: Verify CLI binary executes
        run: just ci-verify-binary "${{ env.CLI_BIN }}"

      - name: Check CLI binary size
        run: just ci-check-binary-size "${{ env.CLI_BIN }}" "${{ env.CLI_MAX_BYTES }}"

  test-python:
    name: Test Python (${{ matrix.python-version }})
    needs: lint
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-py${{ matrix.python-version }}-${{ hashFiles('**/Cargo.lock', 'requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-py${{ matrix.python-version }}-

      - name: Setup Python environment
        run: just python-setup

      - name: Run Python tests
        run: just ci-test-python

  test-typescript:
    name: Test TypeScript
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-ts-${{ hashFiles('**/Cargo.lock', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-ts-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript bindings
        # Build inside domainforge-typescript/ (where the napi package + config live).
        # Root index.js re-exports domainforge-typescript/index.js, so the test loader
        # (imported by tests via '../index') resolves the native binary in place.
        run: cd domainforge-typescript && bun run build

      - name: Run TypeScript tests
        run: just ci-test-ts

  test-integration:
    name: Minimal Integration Check
    needs: [test-rust, test-typescript]
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build domainforge binary
        run: cargo build -p domainforge-core --bin domainforge --features cli

      - name: Build TypeScript bindings (minimal)
        run: |
          bun install --frozen-lockfile
          cd domainforge-typescript && bun run build

      - name: Minimal registry ambiguity check
        shell: bash
        run: |
          tmpdir=$(mktemp -d)
          tee "$tmpdir/.sea-registry.toml" > /dev/null <<'EOF'
          version = 1
          default_namespace = "default"

          [[namespaces]]
          namespace = "a"
          patterns = ["domains/*/warehouse.sea"]

          [[namespaces]]
          namespace = "b"
          patterns = ["domains/*/warehouse.sea"]
          EOF
          mkdir -p "$tmpdir/domains/logistics"
          echo 'Entity "Warehouse"' > "$tmpdir/domains/logistics/warehouse.sea"

          # Test that --fail-on-ambiguity properly detects ambiguous matches
          # The command should fail and output an error message
          set +e  # Temporarily disable exit on error
          output=$(./target/debug/domainforge registry resolve --fail-on-ambiguity "$tmpdir/domains/logistics/warehouse.sea" 2>&1)
          exit_code=$?
          set -e  # Re-enable exit on error

          if [ $exit_code -ne 0 ] && echo "$output" | grep -q "multiple namespaces"; then
            echo "✓ Ambiguity detection working correctly"
            echo "Output: $output"
            exit 0
          else
            echo "✗ Expected ambiguity error but got:"
            echo "Exit code: $exit_code"
            echo "Output: $output"
            exit 1
          fi

  test-wasm:
    name: Test WASM
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-wasm-

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM
        run: |
          cd domainforge-core
          wasm-pack build --target web --features wasm

      - name: Check bundle size
        run: |
          WASM_FILE="domainforge-core/pkg/domainforge_core_bg.wasm"
          python3 scripts/ci_tasks.py check-size --file "$WASM_FILE" --max-bytes "${{ env.WASM_MAX_BYTES }}" --label "WASM bundle"

  security:
    name: Security Audit
    needs: lint
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        # Run cargo-audit directly instead of the deprecated rustsec/audit-check
        # action, which fails with "Resource not accessible by integration" when
        # it tries to publish a check run the default GITHUB_TOKEN cannot create.
        # `cargo audit` reads audit.toml and exits non-zero only on unignored
        # vulnerabilities.
        run: cargo install cargo-audit --locked --quiet

      - name: Run cargo audit
        run: cargo audit

  verify-lean:
    name: Verify Lean projection proof-checks
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Project the Lean fixture
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format lean --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/lean/basic/domain/model.sea lean_out

      - name: Install elan and resolve lake manifest
        # lean-action's config step requires a committed lake-manifest.json,
        # which the projection does not emit (it is a generated lockfile).
        # Install elan and run `lake update` to materialize it from
        # lakefile.toml + lean-toolchain before lean-action runs.
        # `$GITHUB_PATH` only affects later steps, so export elan's bin dir
        # locally here; lean-action re-exposes lake to the "Reject sorry" step.
        run: |
          set -e
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          export PATH="$HOME/.elan/bin:$PATH"
          cd lean_out && lake update

      - name: Check proofs with lake build
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean_out

      - name: Reject sorry in the checked layer
        run: |
          cd lean_out
          lake build DomainForge 2>&1 | tee build.log
          if grep -q "uses 'sorry'" build.log; then
            echo "::error::generated DomainForge library contains sorry"
            exit 1
          fi

  verify-rdf:
    name: Verify RDF projection validates
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Project the RDF fixture
        run: |
          cargo run --release --features cli,shacl --bin domainforge -- project \
            --format rdf --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/rdf/basic/domain/model.sea rdf_out

      - name: Validate the emitted Turtle with SHACL
        run: |
          cargo run --release --features cli,shacl --bin domainforge -- \
            validate-kg rdf_out/model.ttl

      - name: Parse the emitted JSON-LD
        run: |
          python3 -c "import json; json.load(open('rdf_out/model.jsonld')); print('model.jsonld parses')"

      - name: Assert byte-determinism across two runs
        run: |
          cargo run --release --features cli,shacl --bin domainforge -- project \
            --format rdf --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/rdf/basic/domain/model.sea rdf_out2
          diff -r rdf_out rdf_out2

  verify-bpmn:
    name: Verify BPMN projection validates
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Install xmllint (BPMN 2.0 XSD validator)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Project the BPMN fixture
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format bpmn --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/bpmn/basic/domain/model.sea bpmn_out

      - name: Validate the emitted BPMN against the vendored XSD
        run: |
          xmllint --schema schemas/bpmn/BPMN20.xsd bpmn_out/model.bpmn --noout

      - name: Assert byte-determinism across two runs
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format bpmn --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/bpmn/basic/domain/model.sea bpmn_out2
          diff -r bpmn_out bpmn_out2

  verify-cmmn:
    name: Verify CMMN projection validates
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Install xmllint (CMMN 1.1 XSD validator)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Project the CMMN fixture
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format cmmn --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/cmmn/basic/domain/model.sea cmmn_out

      - name: Validate the emitted CMMN against the vendored XSD
        run: |
          xmllint --schema schemas/cmmn/CMMN11.xsd cmmn_out/model.cmmn --noout

      - name: Assert byte-determinism across two runs
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format cmmn --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/cmmn/basic/domain/model.sea cmmn_out2
          diff -r cmmn_out cmmn_out2

  verify-archimate:
    name: Verify ArchiMate projection validates
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Install xmllint (ArchiMate Model Exchange XSD validator)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Project the ArchiMate fixture
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format archimate --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/archimate/basic/domain/model.sea archimate_out

      - name: Validate the emitted model against the vendored XSD
        run: |
          xmllint --schema schemas/archimate/archimate3_Diagram.xsd archimate_out/model.xml --noout

      - name: Assert byte-determinism across two runs
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format archimate --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/archimate/basic/domain/model.sea archimate_out2
          diff -r archimate_out archimate_out2

  verify-otel:
    name: Verify OTel SemConv projection validates
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      # NOTE: OpenTelemetry's official `weaver registry check` is intentionally
      # NOT used here. `weaver` is a heavy binary whose registry schema has
      # churned across releases; for the small, closed registry subset this
      # projection emits, we gate on a JSON-Schema validation of the YAML
      # instead (schemas/otel/semconv_registry.schema.json). See
      # docs/otel-projections.md and schemas/otel/VENDORED.md for the rationale.
      - name: Install YAML + JSON-Schema validators
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml jsonschema

      - name: Project the OTel fixture
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format otel-semconv --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/otel/basic/domain/model.sea otel_out

      - name: Validate the emitted registry against the JSON schema
        run: |
          python3 - <<'PY'
          import json, sys, yaml, jsonschema
          registry = yaml.safe_load(open("otel_out/registry/telemetry.yaml"))
          schema = json.load(open("schemas/otel/semconv_registry.schema.json"))
          jsonschema.validate(registry, schema)

          # Single-producer gate: the registry attribute set must equal the
          # generated Rust constant values.
          ids = {
              a["id"]
              for g in registry["groups"]
              if g["type"] == "attribute_group"
              for a in g["attributes"]
          }
          consts = set()
          for line in open("otel_out/constants/attributes.rs"):
              if '= "' in line:
                  consts.add(line.split('= "', 1)[1].rstrip().rstrip(";").strip('"'))
          consts = {c for c in consts if "." in c}
          if ids != consts:
              print("registry vs constants mismatch:", ids ^ consts, file=sys.stderr)
              sys.exit(1)
          assert "domainforge.model.hash" in ids
          print(f"OTel registry valid: {len(ids)} attributes agree across registry + constants")
          PY

      - name: Assert byte-determinism across two runs
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format otel-semconv --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/otel/basic/domain/model.sea otel_out2
          diff -r otel_out otel_out2

  verify-baml:
    name: Verify BAML projection is well-formed
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      # NOTE: BAML's official `baml-cli generate` is intentionally NOT used here.
      # The generated project leaves the `client<llm>` block as a documented,
      # commented-out placeholder so the output is vendor-neutral (no provider or
      # credentials baked in). `baml-cli generate` would fail on that intentionally
      # undefined client, and baking a vendor into the fixture purely to satisfy the
      # generator would defeat the goal. We validate the emitted `.baml`
      # structurally instead (schemas/baml/check_baml.py). See
      # docs/baml-projections.md and schemas/baml/VENDORED.md for the rationale.
      - name: Project the BAML fixture
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format baml --recipe fixtures/baml/basic/recipes/baml.json \
            --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/baml/basic/domain/model.sea baml_out

      - name: Structurally validate the emitted BAML
        run: |
          python3 schemas/baml/check_baml.py baml_out/baml_src

      - name: Assert a resolver-grounded authority case is present verbatim
        run: |
          grep -q 'actor_role "CertifiedAuditor"' baml_out/baml_src/tests.baml
          grep -q 'operation "close_audit_finding"' baml_out/baml_src/tests.baml
          grep -q 'resource_type "AuditFinding"' baml_out/baml_src/tests.baml

      - name: Assert byte-determinism across two runs
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format baml --recipe fixtures/baml/basic/recipes/baml.json \
            --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/baml/basic/domain/model.sea baml_out2
          diff -r baml_out baml_out2

  verify-dspy:
    name: Verify DSPy projection is well-formed
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      # NOTE: DSPy's optimizer is intentionally NOT run here. The projection
      # emits program + config only; the baseline-vs-optimized comparison and
      # the regression gate live in the emitted `optimize.py` (the user's
      # compute, which needs a configured LM and a vendor). The plan's accepted
      # floor is a Python `ast.parse` well-formedness check over every emitted
      # `.py` file, which needs no third-party install. See
      # docs/dspy-projections.md for the scope boundary.
      - name: Project the DSPy fixture
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format dspy --recipe fixtures/dspy/basic/recipes/dspy.json \
            --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/dspy/basic/domain/model.sea dspy_out

      - name: Assert every emitted Python file parses
        run: |
          python3 - <<'PY'
          import ast, glob, sys
          files = sorted(glob.glob("dspy_out/**/*.py", recursive=True))
          assert files, "no emitted .py files found"
          for path in files:
              with open(path, "r", encoding="utf-8") as handle:
                  ast.parse(handle.read())
              print("ast.parse OK:", path)
          PY

      - name: Project the ai-learning dataset it references
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format ai-learning --recipe fixtures/dspy/basic/recipes/dspy.json \
            --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/dspy/basic/domain/model.sea ai_learning_out

      - name: Assert DSPy example refs resolve to ai-learning output
        run: |
          python3 - <<'PY'
          import json, os, sys
          with open("dspy_out/dspy.config.json", "r", encoding="utf-8") as handle:
              config = json.load(handle)
          dataset = config["dataset"]
          for key in ("train", "dev"):
              ref = os.path.join("ai_learning_out", dataset[key])
              if not os.path.exists(ref):
                  sys.exit(f"DSPy {key} ref does not resolve to an ai-learning file: {ref}")
              print(f"{key} ref resolves:", ref)
          PY

      - name: Assert byte-determinism across two runs
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format dspy --recipe fixtures/dspy/basic/recipes/dspy.json \
            --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/dspy/basic/domain/model.sea dspy_out2
          diff -r dspy_out dspy_out2

  verify-zenml:
    name: Verify ZenML projection is well-formed
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      # NOTE: a real `pip install zenml` + live pipeline construction is
      # intentionally NOT run here (yet). ZenML's dependency tree is very heavy
      # (SQLAlchemy, pydantic, a web stack, ML extras) and slow/flaky to install
      # on every CI run, and — per the scope boundary — the projection emits the
      # pipeline DEFINITION only; training/evaluation/promotion is the user's
      # compute on their ZenML stack. The plan's accepted blocking floor is a
      # Python `ast.parse` well-formedness check over every emitted `.py` file
      # (needs no third-party install), plus the cross-projection dataset-ref
      # check. This is the same substitution the OTel (weaver) and DSPy
      # projections make for heavyweight external tools; promoting a pinned
      # `zenml` install to a separate non-blocking job is a documented follow-up.
      # See docs/zenml-projections.md for the scope boundary and the pinned API
      # line (ZENML_TARGET_VERSION).
      - name: Project the ZenML fixture
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format zenml --recipe fixtures/zenml/basic/recipes/zenml.json \
            --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/zenml/basic/domain/model.sea zenml_out

      - name: Assert every emitted Python file parses
        run: |
          python3 - <<'PY'
          import ast, glob
          files = sorted(glob.glob("zenml_out/**/*.py", recursive=True))
          assert files, "no emitted .py files found"
          for path in files:
              with open(path, "r", encoding="utf-8") as handle:
                  ast.parse(handle.read())
              print("ast.parse OK:", path)
          PY

      - name: Project the ai-learning dataset it references
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format ai-learning --recipe fixtures/zenml/basic/recipes/zenml.json \
            --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/zenml/basic/domain/model.sea ai_learning_out

      - name: Assert ZenML dataset refs resolve to ai-learning output
        run: |
          python3 - <<'PY'
          import json, os, sys
          with open("zenml_out/zenml.config.json", "r", encoding="utf-8") as handle:
              config = json.load(handle)
          dataset = config["dataset"]
          for key in ("train", "dev"):
              ref = os.path.join("ai_learning_out", dataset[key])
              if not os.path.exists(ref):
                  sys.exit(f"ZenML {key} ref does not resolve to an ai-learning file: {ref}")
              print(f"{key} ref resolves:", ref)
          PY

      - name: Assert byte-determinism across two runs
        run: |
          cargo run --release --features cli --bin domainforge -- project \
            --format zenml --recipe fixtures/zenml/basic/recipes/zenml.json \
            --created-at 2026-07-02T00:00:00+00:00 \
            fixtures/zenml/basic/domain/model.sea zenml_out2
          diff -r zenml_out zenml_out2

  verify-projection-targets:
    # H4: runs all projection gates (scripts/verify/projection-targets/all.sh)
    # — the event/authority/verification/activation targets plus the round-trip
    # cell and the three code targets (domain-python/typescript/rust). Each gate
    # projects the fixture and validates the output with the real ecosystem
    # toolchain where available (TLA+ → SANY+TLC, Dagger → py_compile,
    # CloudEvents → strict JSONL + RFC 3339, domain-python → mypy --strict,
    # domain-typescript → tsc --noEmit, domain-rust → cargo check+test).
    # ADR-011 §1 requires this job to exist so the targets have CI regression
    # protection.
    name: Verify projection targets (event/authority/verification/activation/code)
    needs: lint
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Install Java (for TLA+ SANY/TLC toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node (for domain-typescript tsc --noEmit)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python tooling (pyyaml for AsyncAPI; mypy for domain-python)
        run: python3 -m pip install --user pyyaml mypy

      - name: Pin tla2tools.jar (TLA+ toolchain v1.8.0)
        run: |
          mkdir -p schemas/tla
          curl -sL -o schemas/tla/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          # Verify it's a valid jar.
          jar tf schemas/tla/tla2tools.jar | grep -q tla2sany/SANY.class

      - name: Run all projection-target gates
        env:
          TLA2TOOLS_JAR: ${{ github.workspace }}/schemas/tla/tla2tools.jar
        run: bash scripts/verify/projection-targets/all.sh

  prove:
    # Self-proving harness: `just prove` runs the full proof suite (language,
    # canonical determinism, all projection gates, round-trip, drift) and
    # writes evidence/latest/proof.json + proof.md. Fails if any required proof
    # fails (the exit code guarantees overall_result == "passed"). Runs the
    # TLA+ toolchain natively (Java + pinned tla2tools.jar) so CLAIM-PROJ-TLA is
    # proven natively here, not just structurally. See PROOFS.md.
    name: Prove (self-proving evidence pack)
    needs: lint
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.CACHE_VERSION }}-cargo-

      - name: Install Java (for TLA+ SANY/TLC toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Node (for domain-typescript tsc --noEmit)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python tooling (pyyaml for AsyncAPI; mypy for domain-python)
        run: python3 -m pip install --user pyyaml mypy

      - name: Install jq (evidence-pack merge)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Pin tla2tools.jar (TLA+ toolchain v1.8.0)
        run: |
          mkdir -p schemas/tla
          curl -sL -o schemas/tla/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          jar tf schemas/tla/tla2tools.jar | grep -q tla2sany/SANY.class

      - name: Run just prove
        env:
          TLA2TOOLS_JAR: ${{ github.workspace }}/schemas/tla/tla2tools.jar
        run: just prove

      - name: Upload evidence pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domainforge-proof-evidence
          path: evidence/latest/
          if-no-files-found: warn
